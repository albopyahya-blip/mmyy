<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background-color: #000;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    padding: 20px;
  }

  .center-text {
    color: #ffffff;
    font-size: 2rem;
    font-weight: 600;
    line-height: 2;
    text-align: left;
    direction: ltr;
    max-width: 700px;
    letter-spacing: 0.05em;
    white-space: pre-wrap;
    opacity: 0;
    animation: glowFade 0.5s forwards;
    animation-delay: 0.3s;
    margin-bottom: 30px;
  }

  @keyframes glowFade {
    to { opacity: 1; }
  }

  .word {
    opacity: 0;
    display: inline-block;
    animation: wordAppear 0.5s forwards;
  }

  @keyframes wordAppear {
    to { opacity: 1; }
  }

  .btn {
    padding: 12px 30px;
    background-color: #000;
    color: #fff;
    font-weight: 600;
    font-size: 1.1rem;
    border: 2px solid #fff;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
    opacity: 0;
  }

  .btn:hover {
    background-color: #333;
  }

  @media (max-width: 600px) {
    .center-text {
      font-size: 1.4rem;
      line-height: 1.6;
      letter-spacing: 0.03em;
      max-width: 90%;
    }

    .btn {
      padding: 10px 20px;
      font-size: 1rem;
    }
  }
</style>
</head>
<body>

<div class="center-text" id="message"></div>
<button class="btn" id="openBtn" onclick="openPage()">Open</button>

<script>
const text = "If you asked me how many times you’ve crossed my mind I’d say just once because you came into my life and never left Life feels beautiful simply because you’re in it.";
const container = document.getElementById("message");
const btn = document.getElementById("openBtn");

// تقسيم النص لكلمات مع ظهور تدريجي أبطأ
const words = text.split(" ");
const delay = 0.5; // مدة التأخير بين الكلمات بالثواني (أبطأ)
words.forEach((word, i) => {
  const span = document.createElement("span");
  span.className = "word";
  span.style.animationDelay = (i * delay) + "s";
  span.textContent = word + " ";
  container.appendChild(span);
});

// وقت ظهور الزر بعد انتهاء كل الكلمات
const totalTime = words.length * delay * 1000 + 500; // + مدة ظهور آخر كلمة
setTimeout(() => {
  btn.style.opacity = 1;
}, totalTime);

// دالة فتح الصفحة عند الضغط على الزر
function openPage() {
  window.open("index3.html", "_blank");
}
</script>

</body>
</html>
