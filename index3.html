<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* =======================
BODY
======================= */
body{
  background:#111111; /* خلفية داكنة ثابتة */
  color:#eeeeee;
  font-family:'Poppins',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  text-align:center;
  padding:2rem;
  overflow:hidden;
}

/* =======================
TITLE
======================= */
.gallery-container h1{
  font-family:'Dancing Script',cursive;
  font-size:3.5rem;
  margin-bottom:2rem;
  color:#ff66aa;
}

/* =======================
PHOTO CARD
======================= */
.photo-entry{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  max-width:500px;
  border-radius:20px;
  box-shadow:0 15px 35px rgba(0,0,0,0.2);
  overflow:hidden;
  margin:auto;
}

.photo-entry img,
.photo-entry video{
  width:100%;
  display:block;
}

.description{
  padding:2rem;
  font-size:1.2rem;
}
</style>
</head>

<body>

<!-- GALLERY -->
<main class="gallery-container">
  <div class="photo-entry">
    <img src="img/WhatsApp Image 2026-03-29 at 1.39.46 PM.jpeg" alt="Photo">
    <!-- <p class="description">
      I love you more than you’ll ever know
    </p> -->
  </div>
</main>

</body>
</html>
